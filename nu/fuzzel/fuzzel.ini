[main]
dpi-aware=yes
font=Cascadia Mono NF:size=10
prompt=❯❯❯
icon-theme=hicolor
icons-enabled=yes
fields=name,filename,generic
filter-desktop=yes
match-mode=fzf
sort-result=yes
list-executables-in-path=yes
terminal=kitty
horizontal-pad=12
vertical-pad=8
line-height=24
lines=8

[dmenu]
mode=text
exit-immediately-if-empty=yes

[colors]
background=1e1e2eee
text=cdd6f4ff
match=cba6f7ff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=cba6f7ff
border=89b4faff

[border]
radius=16
width=3
